<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>කෙයාරා — Sinhala Call Center Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);min-height:100vh;font-family:'Noto Sans Sinhala',sans-serif;padding:24px;color:#fff}
    .container{max-width:600px;margin:0 auto}
    h1{text-align:center;margin-bottom:8px;color:#06d6a0}
    .subtitle{text-align:center;color:#aaa;margin-bottom:24px}
    .status{padding:12px;background:#1a2634;border-radius:8px;margin-bottom:16px;min-height:48px}
    .status.connected{border-left:4px solid #06d6a0}
    .status.error{border-left:4px solid #e94560}
    .status.playing{border-left:4px solid #facc15}
    .status.listening{border-left:4px solid #06d6a0}
    .controls{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;justify-content:center}
    button{padding:14px 28px;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-family:inherit;transition:all 0.2s;font-size:1rem}
    .btn-connect{background:#16a085;color:#fff}
    .btn-connect:hover:not(:disabled){background:#06d6a0;transform:scale(1.02)}
    .btn-disconnect{background:#e94560;color:#fff}
    button:disabled{opacity:0.5;cursor:not-allowed}
    .transcript{background:#1a2634;border-radius:8px;padding:16px;min-height:120px;max-height:320px;overflow-y:auto;white-space:pre-wrap;font-size:0.9rem;margin-top:16px}
    .feedback-link{margin-top:24px;text-align:center}
    .feedback-link a{color:#06d6a0;text-decoration:none;border:1px solid #16a085;padding:10px 20px;border-radius:8px;display:inline-block}
    .feedback-link a:hover{background:#16a085;color:#fff}
  </style>
</head>
<body>
  <div class="container">
    <h1>කෙයාරා —  Sinhala Call Center Assistant</h1>
    <p class="subtitle"></p>

    <div id="status" class="status">Disconnected. Click Connect to start.</div>
    <div id="urlWarning" style="display:none;color:#facc15;font-size:0.85rem;margin-bottom:12px;text-align:center">
      ⚠ Use <strong>http://127.0.0.1:8000/voice</strong> (not file://) so API calls work.
    </div>

    <div class="controls">
      <button id="btnConnect" class="btn-connect">Connect</button>
      <button id="btnDisconnect" class="btn-disconnect" disabled>Disconnect</button>
    </div>

    <div class="transcript" id="transcript"></div>

    <div class="feedback-link">
      <a href="/static/feedback.html" id="feedbackLink">Give Feedback</a>
    </div>
  </div>

  <script>
    // API base - use same origin when served from server; fallback for file:// open
    const API_BASE = (window.location.origin && window.location.origin.startsWith('http'))
      ? window.location.origin : 'http://127.0.0.1:8000';
    const USE_LIVE_API = false;  // Voice capture now always goes via backend (STT+LLM)
    const CAPTURE_SECONDS = 10;

    let sessionId = null;
    let phrases = {};
    let isConnected = false;

    const statusEl = document.getElementById('status');
    const btnConnect = document.getElementById('btnConnect');
    const btnDisconnect = document.getElementById('btnDisconnect');
    const transcriptEl = document.getElementById('transcript');
    const feedbackLink = document.getElementById('feedbackLink');

    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className = 'status' + (cls ? ' ' + cls : '');
    }

    function appendTranscript(who, text) {
      if (!text) return;
      const p = document.createElement('p');
      p.innerHTML = '<strong>' + who + ':</strong> ' + text;
      transcriptEl.appendChild(p);
      transcriptEl.scrollTop = transcriptEl.scrollHeight;
    }

    async function playTts(text) {
      setStatus('Playing...', 'playing');
      try {
        const res = await fetch(API_BASE + '/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        const ct = res.headers.get('content-type') || '';
        if (ct.includes('application/json')) {
          const d = await res.json();
          throw new Error(d.error || 'TTS not configured');
        }
        const blob = await res.blob();
        const audio = new Audio(URL.createObjectURL(blob));
        await new Promise((resolve, reject) => {
          audio.onended = () => { URL.revokeObjectURL(audio.src); resolve(); };
          audio.onerror = reject;
          audio.play();
        });
      } catch (e) {
        const msg = (e.message === 'Failed to fetch') ? 'Server unreachable. Is the backend running?' : e.message;
        setStatus('TTS: ' + msg, 'error');
        throw e;
      }
    }

    function speakText(text) {
      return new Promise((resolve, reject) => {
        if (!text || !window.speechSynthesis) {
          resolve();
          return;
        }
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'si-LK';
        u.onend = () => resolve();
        u.onerror = (e) => reject(e);
        window.speechSynthesis.speak(u);
      });
    }

    async function captureVoiceAsPcm() {
      return new Promise((resolve) => {
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
          const ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
          const src = ctx.createMediaStreamSource(stream);
          const proc = ctx.createScriptProcessor(4096, 1, 1);
          const chunks = [];
          proc.onaudioprocess = (e) => {
            const d = e.inputBuffer.getChannelData(0);
            const pcm = new Int16Array(d.length);
            for (let i = 0; i < d.length; i++) pcm[i] = Math.max(-32768, Math.min(32767, d[i] * 32768));
            chunks.push(pcm);
          };
          proc.connect(ctx.destination);
          src.connect(proc);
          setStatus('Listening... (' + CAPTURE_SECONDS + ' sec)', 'listening');
          setTimeout(() => {
            proc.disconnect();
            stream.getTracks().forEach(t => t.stop());
            const totalLen = chunks.reduce((a, c) => a + c.length, 0);
            const merged = new Int16Array(totalLen);
            let offset = 0;
            for (const c of chunks) {
              merged.set(c, offset);
              offset += c.length;
            }
            resolve({ buffer: merged.buffer, sampleRate: ctx.sampleRate });
          }, CAPTURE_SECONDS * 1000);
        }).catch(() => resolve({ buffer: new ArrayBuffer(0), sampleRate: 16000 }));
      });
    }

    async function postVoiceToLlm(audioData) {
      setStatus('LLM processing...', 'playing');
      try {
        const { buffer, sampleRate } = typeof audioData === 'object' && audioData.buffer ? audioData : { buffer: audioData, sampleRate: 16000 };
        const formData = new FormData();
        formData.append('audio', new Blob([buffer], { type: 'audio/l16' }), 'audio.pcm');
        formData.append('sample_rate', String(sampleRate));
        if (sessionId) formData.append('session_id', sessionId);
        console.log('[API] POST', API_BASE + '/voice-to-llm', { session_id: sessionId });
        const res = await fetch(API_BASE + '/voice-to-llm', {
          method: 'POST',
          body: formData
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        if (data.transcript) appendTranscript('You', data.transcript || '(no input)');
        if (data.text) {
          appendTranscript('Assistant', data.text);
          setStatus('Speaking...', 'playing');
          await speakText(data.text);
        }
      } catch (e) {
        console.error('Voice-to-LLM error:', e);
        const msg = (e.message === 'Failed to fetch') ? 'Server unreachable. Is the backend running?' : e.message;
        setStatus('LLM: ' + msg, 'error');
      }
    }

    async function postVoiceToText(audioData) {
      try {
        const { buffer, sampleRate } = typeof audioData === 'object' && audioData.buffer ? audioData : { buffer: audioData, sampleRate: 16000 };
        const formData = new FormData();
        formData.append('audio', new Blob([buffer], { type: 'audio/l16' }), 'audio.pcm');
        formData.append('sample_rate', String(sampleRate));
        const res = await fetch(API_BASE + '/voice-to-text', { method: 'POST', body: formData });
        const data = await res.json();
        return (data.transcript || '').trim();
      } catch (e) {
        return '';
      }
    }

    function isYes(text) {
      const t = (text || '').trim().toLowerCase();
      return /^ඔව්|^ow|^yes|ඔව්\s*$/.test(t) || t === 'ඔව්';
    }
    function isNo(text) {
      const t = (text || '').trim().toLowerCase();
      return /^නැහැ|^නැ|^no|නැහැ\s*$/.test(t) || t === 'නැහැ' || t === 'නැ';
    }

    async function mainLoop() {
      const audioData = await captureVoiceAsPcm();
      await postVoiceToLlm(audioData);
      await playTts(phrases.follow_up);
      const responseAudio = await captureVoiceAsPcm();
      const response = await postVoiceToText(responseAudio);
      appendTranscript('You', response || '(no input)');
      if (isYes(response)) {
        await playTts(phrases.yes_prompt);
        return mainLoop();
      } else {
        await playTts(phrases.goodbye);
        await playTts(phrases.rate_msg);
        setStatus('Conversation ended.', 'connected');
        return;
      }
    }

    async function connect() {
      try {
        setStatus('Connecting...', '');
        const [sessionRes, phrasesRes] = await Promise.all([
          fetch(API_BASE + '/live/session-id'),
          fetch(API_BASE + '/phrases')
        ]);
        const sessionData = await sessionRes.json();
        phrases = await phrasesRes.json();
        sessionId = sessionData.session_id;
        feedbackLink.href = '/static/feedback.html?session_id=' + encodeURIComponent(sessionId);

        await playTts(phrases.greeting);

        isConnected = true;
        setStatus('Connected. Mic open. Capturing...', 'connected');
        btnConnect.disabled = true;
        btnDisconnect.disabled = false;

        mainLoop();
      } catch (err) {
        const msg = (err.message === 'Failed to fetch') ? 'Server unreachable. Is the backend running?' : err.message;
        setStatus('Error: ' + msg, 'error');
      }
    }

    function disconnect() {
      isConnected = false;
      sessionId = null;
      setStatus('Disconnected. Click Connect to start.', '');
      btnConnect.disabled = false;
      btnDisconnect.disabled = true;
    }

    if (!window.location.origin.startsWith('http')) {
      document.getElementById('urlWarning').style.display = 'block';
    }

    btnConnect.addEventListener('click', connect);
    btnDisconnect.addEventListener('click', disconnect);
  </script>
</body>
</html>
